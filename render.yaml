previewsEnabled: false
services:
  - type: web
    name: vmis
    rootDir: /
    env: docker
    buildCommand: docker build -t vmis .
    startCommand: docker run -p 80:80 vmis
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"