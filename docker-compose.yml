version: '3.8'

services:
  vmis:
    build: .
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - JWT_SECRET=vmis-secret-key-change-this-in-production
      - JWT_EXPIRATION=86400000
      - JWT_ISSUER=vmis-app
      - JWT_AUDIENCE=vmis-client
    volumes:
      - vmis-data:/app/data
    restart: unless-stopped

volumes:
  vmis-data: