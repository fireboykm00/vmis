# Unified nginx for single server deployment
# Handles both frontend SPA and backend API

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_at;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable cache for API
        proxy_no_cache 1;
    }

    # Frontend SPA
    location / {
        proxy_pass http://localhost:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8080/api/health;
    }
}