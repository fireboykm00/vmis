# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.whitelabel.enabled=false

# CORS Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Database Configuration - H2 In-Memory (changeable to MySQL/PostgreSQL for production)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:vmisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# H2 Console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=${JWT_SECRET:vmis-secret-key-change-this-in-production-minimum-32-chars}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.issuer=${JWT_ISSUER:vmis-app}
app.jwt.audience=${JWT_AUDIENCE:vmis-client}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.vmis=${LOGGING_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n